<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>IPB Cifras</title>
    <style>
        body { background-color: #141414; color: #ffffff; font-family: Arial, sans-serif; padding: 20px; max-width: 800px; margin: 0 auto; }
        select { width: 100%; padding: 12px; font-size: 16px; background-color: #252525; color: white; border: 1px solid #444; border-radius: 6px; margin-bottom: 20px; }
        pre { font-family: 'Courier New', Courier, monospace; font-size: 16px; line-height: 1.6; overflow-x: auto; white-space: pre; background-color: #1a1a1a; padding: 15px; border-radius: 6px; display: none; }
    </style>
</head>
<body>

    <h2>Selecione a Música:</h2>
    
    <select id="seletor-musica" onchange="carregarCifra()">
        <option value="">-- Carregando músicas da pasta... --</option>
    </select>

    <pre id="conteudo-cifra"></pre>

    <script>
        // CONFIGURAÇÃO: Altere com os seus dados do GitHub
        const USUARIO = 'lucasrgmusic-gif'; 
        const REPOSITORIO = 'IPB_Cifra';
        const PASTA = 'cifras';

        // Busca os arquivos da pasta automaticamente usando a API do GitHub
        async function buscarMusicas() {
            const seletor = document.getElementById('seletor-musica');
            const urlAPI = `https://github.com{USUARIO}/${REPOSITORIO}/contents/${PASTA}`;

            try {
                const resposta = await fetch(urlAPI);
                if (!resposta.ok) throw new Error();
                
                const arquivos = await resposta.json();
                
                seletor.innerHTML = '<option value="">-- Escolha uma cifra --</option>';
                
                // Filtra apenas arquivos que terminam com .txt
                arquivos.forEach(arquivo => {
                    if (arquivo.name.endsWith('.txt')) {
                        const option = document.createElement('option');
                        // Remove o ".txt" do nome para exibir um título limpo na tela
                        const nomeLimpo = arquivo.name.replace('.txt', '').replace(/-/g, ' ');
                        
                        option.value = arquivo.download_url; // Link direto do conteúdo bruto
                        option.textContent = nomeLimpo;
                        seletor.appendChild(option);
                    }
                });
            } catch (erro) {
                seletor.innerHTML = '<option value="">Erro ao carregar pasta ou pasta vazia</option>';
            }
        }

        async function carregarCifra() {
            const seletor = document.getElementById('seletor-musica');
            const urlDownload = seletor.value;
            const areaCifra = document.getElementById('conteudo-cifra');

            if (!urlDownload) { areaCifra.style.display = 'none'; return; }

            try {
                const resposta = await fetch(urlDownload);
                const texto = await resposta.text();
                areaCifra.textContent = texto;
                areaCifra.style.display = 'block';
            } catch (erro) {
                areaCifra.textContent = "Erro ao baixar o conteúdo da cifra.";
                areaCifra.style.display = 'block';
            }
        }

        buscarMusicas();
    </script>
</body>
</html>
