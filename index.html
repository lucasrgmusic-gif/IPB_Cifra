<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>IPB Cifras</title>
    <style>
        :root {
            --bg-color: #141414;
            --container-bg: #1a1a1a;
            --text-color: #ffffff;
            --select-bg: #252525;
            --select-border: #444444;
            --acorde-color: #ff9f43;
            --shadow-color: rgba(0,0,0,0.3);
            --btn-tone-bg: #333333;
            --btn-tone-active: #ff9f43;
            --input-bg: #252525;
        }

        [data-theme="light"] {
            --bg-color: #f5f5f5;
            --container-bg: #ffffff;
            --text-color: #222222;
            --select-bg: #ffffff;
            --select-border: #cccccc;
            --acorde-color: #e67e22;
            --shadow-color: rgba(0,0,0,0.1);
            --btn-tone-bg: #e0e0e0;
            --btn-tone-active: #e67e22;
            --input-bg: #ffffff;
        }

        body { 
            background-color: var(--bg-color); 
            color: var(--text-color); 
            font-family: Arial, sans-serif; 
            padding: 20px 10px; 
            max-width: 800px; 
            margin: 0 auto; 
            transition: background-color 0.3s, color 0.3s;
        }

        .topo-container {
            display: flex;
            flex-direction: column;
            max-width: 440px; 
            margin: 0 auto 10px auto;
            gap: 10px;
        }

        .linha-controles {
            display: flex;
            align-items: center;
            gap: 8px;
            width: 100%;
        }

        input[type="text"] {
            width: 100%;
            box-sizing: border-box;
            padding: 12px;
            font-size: 15px;
            background-color: var(--input-bg);
            color: var(--text-color);
            border: 1px solid var(--select-border);
            border-radius: 6px;
            transition: all 0.3s;
        }

        select { 
            flex-grow: 1;
            padding: 12px; 
            font-size: 15px; 
            background-color: var(--select-bg); 
            color: var(--text-color); 
            border: 1px solid var(--select-border); 
            border-radius: 6px; 
            transition: all 0.3s;
        }

        .btn-controle {
            background-color: var(--select-bg);
            border: 1px solid var(--select-border);
            color: var(--text-color);
            width: 45px;
            height: 45px;
            border-radius: 50%;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 16px;
            font-weight: bold;
            transition: all 0.3s;
            flex-shrink: 0;
        }

        .tons-container {
            display: flex;
            flex-wrap: wrap;
            gap: 8px;
            max-width: 440px;
            margin: 0 auto 20px auto;
            justify-content: flex-start;
        }

        .btn-tom {
            background-color: var(--btn-tone-bg);
            border: none;
            color: var(--text-color);
            padding: 8px 14px;
            font-size: 14px;
            font-weight: bold;
            border-radius: 4px;
            cursor: pointer;
            transition: all 0.2s;
        }

        .btn-tom.ativo {
            background-color: var(--btn-tone-active);
            color: #141414;
        }

        pre { 
            font-family: 'Courier New', Courier, monospace; 
            font-weight: bold; 
            font-size: 20px; 
            line-height: 1.2; 
            overflow-x: auto; 
            white-space: pre; 
            background-color: var(--container-bg); 
            padding: 20px; 
            border-radius: 6px; 
            max-width: 440px; 
            margin: 0 auto; 
            display: none; 
            box-shadow: 0 4px 10px var(--shadow-color);
            transition: background-color 0.3s, box-shadow 0.3s;
            box-sizing: border-box; 
        }

        .acorde {
            color: var(--acorde-color) !important; 
            font-weight: 900 !important; 
            transition: color 0.3s;
        }

        @media (max-width: 480px) {
            body {
                padding: 15px 0px; 
            }
            .topo-container, .tons-container {
                padding: 0 10px; 
                box-sizing: border-box;
            }
            pre {
                max-width: 100%; 
                border-radius: 0px; 
                padding: 20px 10px; 
            }
        }
    </style>
</head>
<body>

    <div class="topo-container">
        <input type="text" id="campo-busca" placeholder="Digite para buscar uma música..." oninput="filtrarMusicas()">
        
        <div class="linha-controles">
            <select id="seletor-musica" onchange="atualizarOpcoesDeTom()">
                <option value="">-- Carregando músicas... --</option>
            </select>
            
            <button class="btn-controle" onclick="alterarTamanhoFonte(-2)" title="Diminuir letra">A-</button>
            <button class="btn-controle" onclick="alterarTamanhoFonte(2)" title="Aumentar letra">A+</button>
            <button class="btn-controle" id="btn-tema" onclick="alternarTema()">🌙</button>
        </div>
    </div>

    <div class="tons-container" id="container-tons"></div>

    <pre id="conteudo-cifra"></pre>

    <script>
        let bancoMusicas = []; 
        let listaNomesUnicos = []; 
        let tamanhoAtualFonte = 20; 

        function alternarTema() {
            const html = document.documentElement;
            const btn = document.getElementById('btn-tema');
            if (html.getAttribute('data-theme') === 'light') {
                html.removeAttribute('data-theme');
                btn.textContent = '🌙';
            } else {
                html.setAttribute('data-theme', 'light');
                btn.textContent = '☀️';
            }
        }

        function alterarTamanhoFonte(mudanca) {
            const areaCifra = document.getElementById('conteudo-cifra');
            tamanhoAtualFonte += mudanca;
            
            if (tamanhoAtualFonte < 12) tamanhoAtualFonte = 12;
            if (tamanhoAtualFonte > 40) tamanhoAtualFonte = 40;
            
            areaCifra.style.fontSize = tamanhoAtualFonte + 'px';
        }

        function formatarCifraManual(texto) {
            const regexAspas = /"([^"]+)"/g;
            return texto.replace(regexAspas, (match, acorde) => {
                return `<span class="acorde">${match.replace(/"/g, '')}</span>`;
            });
        }

        async function iniciar() {
            const seletor = document.getElementById('seletor-musica');
            try {
                const resposta = await fetch('lista.txt');
                if (!resposta.ok) throw new Error();
                
                const texto = await resposta.text();
                const linhas = texto.split('\n');
                
                bancoMusicas = [];
                let nomesUnicos = new Set();
                
                linhas.forEach(linha => {
                    if (linha.trim() === '') return;
                    const [caminho, nome, tom, tamanho] = linha.split(':');
                    
                    bancoMusicas.push({
                        caminho: caminho.trim(),
                        nome: nome.trim(),
                        tom: tom ? tom.trim() : 'Padrão',
                        tamanho: tamanho && !isNaN(tamanho) ? parseInt(tamanho.trim()) : 20 // NOVO: Guarda o tamanho personalizado ou define 20
                    });
                    nomesUnicos.add(nome.trim());
                });
                
                listaNomesUnicos = Array.from(nomesUnicos);
                renderizarSeletor(listaNomesUnicos);
                verificarParametrosURL();

            } catch (erro) {
                seletor.innerHTML = '<option value="">Erro ao carregar a lista</option>';
            }
        }

        function renderizarSeletor(listaDeNomes) {
            const seletor = document.getElementById('seletor-musica');
            seletor.innerHTML = '<option value="">-- Escolha uma cifra --</option>';
            
            listaDeNomes.forEach(nome => {
                const option = document.createElement('option');
                option.value = nome;
                option.textContent = nome;
                seletor.appendChild(option);
            });
        }

        function filtrarMusicas() {
            const termoBusca = document.getElementById('campo-busca').value.toLowerCase().normalize('NFD').replace(/[\u0300-\u036f]/g, "");
            const seletor = document.getElementById('seletor-musica');
            
            const nomesFiltrados = listaNomesUnicos.filter(nome => {
                const nomeLimpo = nome.toLowerCase().normalize('NFD').replace(/[\u0300-\u036f]/g, "");
                return nomeLimpo.includes(termoBusca);
            });

            renderizarSeletor(nomesFiltrados);

            if (nomesFiltrados.length === 1) {
                seletor.value = nomesFiltrados;
                atualizarOpcoesDeTom();
            } else {
                document.getElementById('container-tons').innerHTML = '';
                document.getElementById('conteudo-cifra').style.display = 'none';
            }
        }

        function verificarParametrosURL() {
            const parametros = new URLSearchParams(window.location.search);
            const musicaLink = parametros.get('musica');
            const tomLink = parametros.get('tom');

            if (musicaLink) {
                const musicaDecodificada = decodeURIComponent(musicaLink).trim();
                const seletor = document.getElementById('seletor-musica');
                
                if (listaNomesUnicos.includes(musicaDecodificada)) {
                    seletor.value = musicaDecodificada;
                    atualizarOpcoesDeTom(tomLink ? decodeURIComponent(tomLink).trim() : null); 
                }
            }
        }

        function atualizarOpcoesDeTom(tomPreSelecionado = null) {
            const nomeSelecionado = document.getElementById('seletor-musica').value;
            const containerTons = document.getElementById('container-tons');
            const areaCifra = document.getElementById('conteudo-cifra');
            
            containerTons.innerHTML = '';
            areaCifra.style.display = 'none';

            if (!nomeSelecionado) return;

            const variacoes = bancoMusicas.filter(m => m.nome === nomeSelecionado);
            let botaoParaClicar = null;

            variacoes.forEach((versao, index) => {
                const btn = document.createElement('button');
                btn.className = 'btn-tom';
                btn.textContent = versao.tom;
                btn.onclick = () => {
                    document.querySelectorAll('.btn-tom').forEach(b => b.classList.remove('ativo'));
                    btn.classList.add('ativo');
                    carregarCifra(versao.caminho, versao.tamanho); // NOVO: Passa o tamanho da cifra selecionada
                };
                containerTons.appendChild(btn);
                
                if (tomPreSelecionado && versao.tom.toLowerCase() === tomPreSelecionado.toLowerCase()) {
                    botaoParaClicar = btn;
                } else if (!botaoParaClicar && index === 0) {
                    botaoParaClicar = btn;
                }
            });

            if (botaoParaClicar) {
                botaoParaClicar.click();
            }
        }

        // NOVO: A função agora recebe o tamanho vindo da lista do banco
        async function carregarCifra(caminhoArquivo, tamanhoFonteMusica) {
            const areaCifra = document.getElementById('conteudo-cifra');
            try {
                const resposta = await fetch(caminhoArquivo);
                if (!resposta.ok) throw new Error();
                
                const textoOriginal = await resposta.text();
                areaCifra.innerHTML = formatarCifraManual(textoOriginal);
                
                // NOVO: Aplica o tamanho personalizado da música atual na tela
                tamanhoAtualFonte = tamanhoFonteMusica;
                areaCifra.style.fontSize = tamanhoAtualFonte + 'px';
                
                areaCifra.style.display = 'block';
            } catch (erro) {
                areaCifra.textContent = "Erro ao carregar o texto da cifra.";
                areaCifra.style.display = 'block';
            }
        }

        iniciar();
    </script>
</body>
</html>
