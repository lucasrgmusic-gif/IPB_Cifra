<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>IPB Cifras</title>
    <style>
        body { 
            background-color: #141414; 
            color: #ffffff; 
            font-family: Arial, sans-serif; 
            padding: 20px; 
            max-width: 800px; 
            margin: 0 auto; 
        }
        select { 
            width: 100%; 
            padding: 12px; 
            font-size: 16px; 
            background-color: #252525; 
            color: white; 
            border: 1px solid #444; 
            border-radius: 6px; 
            margin-bottom: 20px; 
        }
        /* Ajuste de tamanho idêntico ao seu print */
        pre { 
            font-family: 'Courier New', Courier, monospace; 
            font-size: 16px; 
            line-height: 1.7; 
            overflow-x: auto; 
            white-space: pre; 
            background-color: #1a1a1a; 
            padding: 20px; 
            border-radius: 6px; 
            max-width: 480px; /* Limita exatamente a largura da caixa de texto */
            margin: 0 auto; /* Centraliza a caixa da cifra na tela */
            display: none; 
            box-shadow: 0 4px 10px rgba(0,0,0,0.3);
        }
        /* Estilo automático dos acordes (Estilo Cifra Club) */
        .acorde {
            color: #ff9f43; /* Laranja suave para melhor leitura */
            font-weight: bold; /* Negrito */
        }
    </style>
</head>
<body>

    <h2 style="text-align: center; max-width: 480px; margin: 0 auto 15px auto;">Selecione a Música:</h2>
    
    <div style="max-width: 480px; margin: 0 auto;">
        <select id="seletor-musica" onchange="carregarCifra()">
            <option value="">-- Carregando músicas... --</option>
        </select>
    </div>

    <pre id="conteudo-cifra"></pre>

    <script>
        // Função inteligente que identifica e colore os acordes automaticamente
        function colorirAcordes(texto) {
            // Expressão regular que identifica padrões de acordes musicais (A-G, sustenidos, bemóis, menores, com sétima, invertidos, etc)
            const regexAcordes = /\b([A-G][#b]?(m|min|maj|dim|aug)?(2|4|5|6|7|9|11|13)?(maj7|maj9|min7|m7|m9|m7b5|dim7|sus2|sus4)?(\/[A-G][#b]?)?)(?=\s|$)/g;
            
            const linhas = texto.split('\n');
            const linhasConvertidas = linhas.map(linha => {
                // Se a linha tiver mais letras normais e espaços longos do que palavras longas, o código entende como linha de acorde
                const palavras = linha.trim().split(/\s+/);
                let ehLinhaDeAcorde = true;

                if (palavras.length === 0 || linha.trim() === '') {
                    ehLinhaDeAcorde = false;
                } else {
                    for (let p of palavras) {
                        // Se uma palavra não bater com a regra de acordes, remove a propriedade da linha
                        if (p.length > 0 && !p.match(/^([A-G][#b]?(m|M|dim|aug|sus|add)?\d*(\/[A-G][#b]?)?|\||\d|v|x)$/)) {
                            ehLinhaDeAcorde = false;
                            break;
                        }
                    }
                }

                if (ehLinhaDeAcorde) {
                    // Substitui os textos dos acordes pela tag HTML com classe CSS laranja
                    return linha.replace(/\b[A-G][#b]?[^\s]*\/?[A-G]?[#b]?\b/g, match => `<span class="acorde">${match}</span>`);
                }
                return linha;
            });

            return linhasConvertidas.join('\n');
        }

        async function iniciar() {
            const seletor = document.getElementById('seletor-musica');
            try {
                const resposta = await fetch('lista.txt');
                if (!resposta.ok) throw new Error();
                
                const texto = await resposta.text();
                const linhas = texto.split('\n');
                
                seletor.innerHTML = '<option value="">-- Escolha uma cifra --</option>';
                
                linhas.forEach(linha => {
                    if (linha.trim() === '') return;
                    const [caminhoArquivo, nomeExibicao] = linha.split(':');
                    
                    const option = document.createElement('option');
                    option.value = caminhoArquivo.trim();
                    option.textContent = nomeExibicao.trim();
                    seletor.appendChild(option);
                });
            } catch (erro) {
                seletor.innerHTML = '<option value="">Erro ao carregar a lista de músicas</option>';
            }
        }

        async function carregarCifra() {
            const seletor = document.getElementById('seletor-musica');
            const arquivo = seletor.value;
            const areaCifra = document.getElementById('conteudo-cifra');

            if (!arquivo) { areaCifra.style.display = 'none'; return; }

            try {
                const resposta = await fetch(arquivo);
                if (!resposta.ok) throw new Error();
                
                const textoOriginal = await resposta.text();
                
                // Aplica a formatação automática antes de jogar na tela
                const textoComCores = colorirAcordes(textoOriginal);
                
                areaCifra.innerHTML = textoComCores;
                areaCifra.style.display = 'block';
            } catch (erro) {
                areaCifra.textContent = "Erro ao carregar o texto da cifra.";
                areaCifra.style.display = 'block';
            }
        }

        iniciar();
    </script>
</body>
</html>
