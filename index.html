<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>IPB Cifras</title>
    <style>
        body { background-color: #141414; color: #ffffff; font-family: Arial, sans-serif; padding: 20px; max-width: 800px; margin: 0 auto; }
        select { width: 100%; padding: 12px; font-size: 16px; background-color: #252525; color: white; border: 1px solid #444; border-radius: 6px; margin-bottom: 20px; }
        pre { font-family: 'Courier New', Courier, monospace; font-size: 16px; line-height: 1.6; overflow-x: auto; white-space: pre; background-color: #1a1a1a; padding: 15px; border-radius: 6px; display: none; }
    </style>
</head>
<body>

    <h2>Selecione a Música:</h2>
    
    <select id="seletor-musica" onchange="carregarCifra()">
        <option value="">-- Carregando músicas... --</option>
    </select>

    <pre id="conteudo-cifra"></pre>

    <script>
        // Carrega a lista de músicas do arquivo lista.txt
        async function iniciar() {
            const seletor = document.getElementById('seletor-musica');
            try {
                const resposta = await fetch('lista.txt');
                if (!resposta.ok) throw new Error();
                
                const texto = await resposta.text();
                const linhas = texto.split('\n');
                
                seletor.innerHTML = '<option value="">-- Escolha uma cifra --</option>';
                
                linhas.forEach(linha => {
                    if (linha.trim() === '') return;
                    const [caminhoArquivo, nomeExibicao] = linha.split(':');
                    
                    const option = document.createElement('option');
                    option.value = caminhoArquivo.trim();
                    option.textContent = nomeExibicao.trim();
                    seletor.appendChild(option);
                });
            } catch (erro) {
                seletor.innerHTML = '<option value="">Erro ao carregar a lista de músicas</option>';
            }
        }

        async function carregarCifra() {
            const seletor = document.getElementById('seletor-musica');
            const arquivo = seletor.value;
            const areaCifra = document.getElementById('conteudo-cifra');

            if (!arquivo) { areaCifra.style.display = 'none'; return; }

            try {
                const resposta = await fetch(arquivo);
                if (!resposta.ok) throw new Error();
                
                const texto = await resposta.text();
                areaCifra.textContent = texto;
                areaCifra.style.display = 'block';
            } catch (erro) {
                areaCifra.textContent = "Erro ao carregar o texto da cifra.";
                areaCifra.style.display = 'block';
            }
        }

        iniciar();
    </script>
</body>
</html>
