<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>IPB Cifras</title>
    <style>
        /* Variáveis de cor para alternar os temas facilmente */
        :root {
            --bg-color: #141414;
            --container-bg: #1a1a1a;
            --text-color: #ffffff;
            --select-bg: #252525;
            --select-border: #444444;
            --acorde-color: #ff9f43;
            --shadow-color: rgba(0,0,0,0.3);
        }

        /* Tema Claro */
        [data-theme="light"] {
            --bg-color: #f5f5f5;
            --container-bg: #ffffff;
            --text-color: #222222;
            --select-bg: #ffffff;
            --select-border: #cccccc;
            --acorde-color: #e67e22; /* Laranja um pouco mais escuro para dar contraste no fundo branco */
            --shadow-color: rgba(0,0,0,0.1);
        }

        body { 
            background-color: var(--bg-color); 
            color: var(--text-color); 
            font-family: Arial, sans-serif; 
            padding: 20px; 
            max-width: 800px; 
            margin: 0 auto; 
            transition: background-color 0.3s, color 0.3s;
        }

        /* Container do topo que alinha o seletor mais curto e o botão de tema */
        .topo-container {
            display: flex;
            align-items: center;
            justify-content: space-between;
            max-width: 440px; /* Encurtou a barra deixando espaço para o botão */
            margin: 0 auto 20px auto;
            gap: 10px;
        }

        select { 
            flex-grow: 1;
            padding: 12px; 
            font-size: 15px; 
            background-color: var(--select-bg); 
            color: var(--text-color); 
            border: 1px solid var(--select-border); 
            border-radius: 6px; 
            transition: background-color 0.3s, color 0.3s, border-color 0.3s;
        }

        /* Botão alternador de tema circular */
        .theme-toggle {
            background-color: var(--select-bg);
            border: 1px solid var(--select-border);
            color: var(--text-color);
            width: 45px;
            height: 45px;
            border-radius: 50%;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 20px;
            transition: background-color 0.3s, color 0.3s, border-color 0.3s;
            flex-shrink: 0;
        }

        /* Caixa de exibição da cifra */
        pre { 
            font-family: 'Courier New', Courier, monospace; 
            font-size: 16px; 
            line-height: 1.2; 
            overflow-x: auto; 
            white-space: pre; 
            background-color: var(--container-bg); 
            padding: 20px; 
            border-radius: 6px; 
            max-width: 440px; /* Acompanha o tamanho mais curto do topo */
            margin: 0 auto; 
            display: none; 
            box-shadow: 0 4px 10px var(--shadow-color);
            transition: background-color 0.3s, box-shadow 0.3s;
        }

        .acorde {
            color: var(--acorde-color) !important; 
            font-weight: bold !important; 
            transition: color 0.3s;
        }
    </style>
</head>
<body>

    <!-- Topo sem a mensagem e com os elementos encurtados/alinhados -->
    <div class="topo-container">
        <select id="seletor-musica" onchange="carregarCifra()">
            <option value="">-- Carregando músicas... --</option>
        </select>
        
        <button class="theme-toggle" id="btn-tema" onclick="alternarTema()" title="Alternar tema">
            🌙 <!-- Ícone inicial (Lua para o modo escuro padrão) -->
        </button>
    </div>

    <pre id="conteudo-cifra"></pre>

    <script>
        // Função para alternar o tema e o ícone
        function alternarTema() {
            const html = document.documentElement;
            const btn = document.getElementById('btn-tema');
            
            if (html.getAttribute('data-theme') === 'light') {
                html.removeAttribute('data-theme');
                btn.textContent = '🌙';
            } else {
                html.setAttribute('data-theme', 'light');
                btn.textContent = '☀️';
            }
        }

        function colorirAcordes(texto) {
            const regexAcordeCompleto = /(?<![a-zA-Zá-úÁ-Ú])([A-G][#b]?(m|M|min|maj|dim|aug|°|º)?(2|4|5|6|7|9|11|13)?(M)?(sus2|sus4|add9)?(\/[A-G][#b]?)?)(?![a-zA-Zá-úÁ-Ú])/g;
            return texto.replace(regexAcordeCompleto, match => `<span class="acorde">${match}</span>`);
        }

        async function iniciar() {
            const seletor = document.getElementById('seletor-musica');
            try {
                const resposta = await fetch('lista.txt');
                if (!resposta.ok) throw new Error();
                
                const texto = await resposta.text();
                const linhas = texto.split('\n');
                
                seletor.innerHTML = '<option value="">-- Escolha uma cifra --</option>';
                
                linhas.forEach(linha => {
                    if (linha.trim() === '') return;
                    const [caminhoArquivo, nomeExibicao] = linha.split(':');
                    
                    const option = document.createElement('option');
                    option.value = caminhoArquivo.trim();
                    option.textContent = nomeExibicao.trim();
                    seletor.appendChild(option);
                });
            } catch (erro) {
                seletor.innerHTML = '<option value="">Erro ao carregar a lista de músicas</option>';
            }
        }

        async function carregarCifra() {
            const seletor = document.getElementById('seletor-musica');
            const arquivo = seletor.value;
            const areaCifra = document.getElementById('conteudo-cifra');

            if (!arquivo) { areaCifra.style.display = 'none'; return; }

            try {
                const resposta = await fetch(arquivo);
                if (!resposta.ok) throw new Error();
                
                const textoOriginal = await resposta.text();
                areaCifra.innerHTML = colorirAcordes(textoOriginal);
                areaCifra.style.display = 'block';
            } catch (erro) {
                areaCifra.textContent = "Erro ao carregar o texto da cifra.";
                areaCifra.style.display = 'block';
            }
        }

        iniciar();
    </script>
</body>
</html>
