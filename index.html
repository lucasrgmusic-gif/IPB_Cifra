<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>IPB Cifras</title>
    <style>
        :root {
            --bg-color: #141414;
            --container-bg: #1a1a1a;
            --text-color: #ffffff;
            --select-bg: #252525;
            --select-border: #444444;
            --acorde-color: #ff9f43;
            --shadow-color: rgba(0,0,0,0.3);
            --btn-tone-bg: #333333;
            --btn-tone-active: #ff9f43;
        }

        [data-theme="light"] {
            --bg-color: #f5f5f5;
            --container-bg: #ffffff;
            --text-color: #222222;
            --select-bg: #ffffff;
            --select-border: #cccccc;
            --acorde-color: #e67e22;
            --shadow-color: rgba(0,0,0,0.1);
            --btn-tone-bg: #e0e0e0;
            --btn-tone-active: #e67e22;
        }

        body { 
            background-color: var(--bg-color); 
            color: var(--text-color); 
            font-family: Arial, sans-serif; 
            padding: 20px; 
            max-width: 800px; 
            margin: 0 auto; 
            transition: background-color 0.3s, color 0.3s;
        }

        .topo-container {
            display: flex;
            align-items: center;
            justify-content: space-between;
            max-width: 440px; 
            margin: 0 auto 10px auto;
            gap: 10px;
        }

        select { 
            flex-grow: 1;
            padding: 12px; 
            font-size: 15px; 
            background-color: var(--select-bg); 
            color: var(--text-color); 
            border: 1px solid var(--select-border); 
            border-radius: 6px; 
            transition: background-color 0.3s, color 0.3s, border-color 0.3s;
        }

        .theme-toggle {
            background-color: var(--select-bg);
            border: 1px solid var(--select-border);
            color: var(--text-color);
            width: 45px;
            height: 45px;
            border-radius: 50%;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 20px;
            transition: background-color 0.3s, color 0.3s, border-color 0.3s;
            flex-shrink: 0;
        }

        /* Container para os botões de seleção de tom */
        .tons-container {
            display: flex;
            flex-wrap: wrap;
            gap: 8px;
            max-width: 440px;
            margin: 0 auto 20px auto;
            justify-content: flex-start;
        }

        .btn-tom {
            background-color: var(--btn-tone-bg);
            border: none;
            color: var(--text-color);
            padding: 8px 14px;
            font-size: 14px;
            font-weight: bold;
            border-radius: 4px;
            cursor: pointer;
            transition: all 0.2s;
        }

        .btn-tom.ativo {
            background-color: var(--btn-tone-active);
            color: #141414;
        }

        pre { 
            font-family: 'Courier New', Courier, monospace; 
            font-size: 16px; 
            line-height: 1.2; 
            overflow-x: auto; 
            white-space: pre; 
            background-color: var(--container-bg); 
            padding: 20px; 
            border-radius: 6px; 
            max-width: 440px; 
            margin: 0 auto; 
            display: none; 
            box-shadow: 0 4px 10px var(--shadow-color);
            transition: background-color 0.3s, box-shadow 0.3s;
        }

        .acorde {
            color: var(--acorde-color) !important; 
            font-weight: bold !important; 
            transition: color 0.3s;
        }
    </style>
</head>
<body>

    <div class="topo-container">
        <select id="seletor-musica" onchange="atualizarOpcoesDeTom()">
            <option value="">-- Carregando músicas... --</option>
        </select>
        
        <button class="theme-toggle" id="btn-tema" onclick="alternarTema()">
            🌙
        </button>
    </div>

    <!-- Área onde os botões de tom aparecerão -->
    <div class="tons-container" id="container-tons"></div>

    <pre id="conteudo-cifra"></pre>

    <script>
        let bancoMusicas = []; // Guarda a lista estruturada de músicas

        function alternarTema() {
            const html = document.documentElement;
            const btn = document.getElementById('btn-tema');
            if (html.getAttribute('data-theme') === 'light') {
                html.removeAttribute('data-theme');
                btn.textContent = '🌙';
            } else {
                html.setAttribute('data-theme', 'light');
                btn.textContent = '☀️';
            }
        }

        // Lógica inteligente que colore acordes e ignora inícios de frase falados
        function colorirAcordes(texto) {
            const linhas = texto.split('\n');
            const linhasConvertidas = linhas.map(linha => {
                // Se a linha tem texto mas começa com um espaço em branco, ela é puramente de cifra
                if (linha.length > 0 && (linha.startsWith(' ') || linha.startsWith('\t'))) {
                    const regexAcordeCompleto = /(?<![a-zA-Zá-úÁ-Ú])([A-G][#b]?(m|M|min|maj|dim|aug|°|º)?(2|4|5|6|7|9|11|13)?(M)?(sus2|sus4|add9)?(\/[A-G][#b]?)?)(?![a-zA-Zá-úÁ-Ú])/g;
                    return linha.replace(regexAcordeCompleto, match => `<span class="acorde">${match}</span>`);
                }
                // Se a linha começa encostada na margem esquerda, presume-se que é letra do hino
                return linha;
            });
            return linhasConvertidas.join('\n');
        }

        async function iniciar() {
            const seletor = document.getElementById('seletor-musica');
            try {
                const resposta = await fetch('lista.txt');
                if (!resposta.ok) throw new Error();
                
                const texto = await fetch('lista.txt').then(r => r.text());
                const linhas = texto.split('\n');
                
                bancoMusicas = [];
                let nomesUnicos = new Set();
                
                linhas.forEach(linha => {
                    if (linha.trim() === '') return;
                    const [caminho, nome, tom] = linha.split(':');
                    
                    bancoMusicas.push({
                        caminho: caminho.trim(),
                        nome: nome.trim(),
                        tom: tom ? tom.trim() : 'Padrão'
                    });
                    nomesUnicos.add(nome.trim());
                });
                
                seletor.innerHTML = '<option value="">-- Escolha uma cifra --</option>';
                nomesUnicos.forEach(nome => {
                    const option = document.createElement('option');
                    option.value = nome;
                    option.textContent = nome;
                    seletor.appendChild(option);
                });
            } catch (erro) {
                seletor.innerHTML = '<option value="">Erro ao carregar a lista</option>';
            }
        }

        // Cria os botões de tom baseados na música escolhida no seletor
        function atualizarOpcoesDeTom() {
            const nomeSelecionado = document.getElementById('seletor-musica').value;
            const containerTons = document.getElementById('container-tons');
            const areaCifra = document.getElementById('conteudo-cifra');
            
            containerTons.innerHTML = '';
            areaCifra.style.display = 'none';

            if (!nomeSelecionado) return;

            // Filtra todas as variações dessa mesma música
            const variacoes = bancoMusicas.filter(m => m.nome === nomeSelecionado);

            variacoes.forEach((versao, index) => {
                const btn = document.createElement('button');
                btn.className = 'btn-tom';
                btn.textContent = versao.tom;
                btn.onclick = () => {
                    // Remove destaque dos outros botões de tom
                    document.querySelectorAll('.btn-tom').forEach(b => b.classList.remove('ativo'));
                    btn.classList.add('ativo');
                    carregarCifra(versao.caminho);
                };
                containerTons.appendChild(btn);
                
                // Abre o primeiro tom disponível automaticamente
                if (index === 0) {
                    btn.click();
                }
            });
        }

        async function carregarCifra(caminhoArquivo) {
            const areaCifra = document.getElementById('conteudo-cifra');
            try {
                const resposta = await fetch(caminhoArquivo);
                if (!resposta.ok) throw new Error();
                
                const textoOriginal = await resposta.text();
                areaCifra.innerHTML = colorirAcordes(textoOriginal);
                areaCifra.style.display = 'block';
            } catch (erro) {
                areaCifra.textContent = "Erro ao carregar o texto da cifra.";
                areaCifra.style.display = 'block';
            }
        }

        iniciar();
    </script>
</body>
</html>
